  <text x="120" y="110" font-family="Georgia,serif" font-size="26" fill="#405359">July 16 — northern ridge</text>
  <text x="120" y="200" font-family="Georgia,serif" font-size="19" fill="#56666a">The morning arrived slowly, carrying the scent</text>
  <text x="120" y="250" font-family="Georgia,serif" font-size="19" fill="#56666a">of wet stone and cedar through the window.</text>
  <text x="120" y="300" font-family="Georgia,serif" font-size="19" fill="#56666a">Beyond the path, the hills held the last blue</text>
  <text x="120" y="350" font-family="Georgia,serif" font-size="19" fill="#56666a">shadow of night.</text>
